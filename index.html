<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="description" content="JavaScript ফাংশন শিখুন বাংলায়">
<link rel="manifest" href="#" />
<title>JS ফাংশন শিখি 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --bg2: #13132a;
    --bg3: #1a1a38;
    --surface: #1e1e40;
    --surface2: #252550;
    --border: #2e2e60;
    --text: #e8e8ff;
    --text2: #a0a0cc;
    --text3: #6060aa;
    --accent1: #7c6dfa; /* violet */
    --accent2: #fa6d8e; /* pink */
    --accent3: #6dfad5; /* teal */
    --accent4: #fad76d; /* yellow */
    --accent5: #6dbaff; /* blue */
    --accent6: #fa9a6d; /* orange */
    --radius: 16px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 24px rgba(124,109,250,0.3);
    --font-main: 'Baloo Da 2', sans-serif;
    --font-code: 'Fira Code', monospace;
    --sidebar-w: 280px;
    --transition: 0.28s cubic-bezier(.4,0,.2,1);
  }
  [data-theme="light"] {
    --bg: #f0f0ff;
    --bg2: #e8e8f8;
    --bg3: #dcdcf5;
    --surface: #ffffff;
    --surface2: #f5f5ff;
    --border: #d0d0ee;
    --text: #1a1a3a;
    --text2: #4040aa;
    --text3: #8080bb;
    --shadow: 0 8px 32px rgba(100,100,200,0.15);
    --shadow-glow: 0 0 24px rgba(124,109,250,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background var(--transition), color var(--transition);
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    z-index:9999;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform var(--transition), background var(--transition);
    overflow: hidden;
  }
  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .sidebar-sub { font-size: .75rem; color: var(--text3); margin-top: 2px; }
  .sidebar-search {
    margin: 12px 16px 8px;
    flex-shrink: 0;
  }
  .sidebar-search input {
    width: 100%;
    padding: 8px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--font-main);
    font-size: .85rem;
    outline: none;
    transition: border-color var(--transition);
  }
  .sidebar-search input:focus { border-color: var(--accent1); }
  .sidebar-search input::placeholder { color: var(--text3); }
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .nav-category {
    padding: 10px 20px 4px;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 0 12px 12px 0;
    margin-right: 12px;
    font-size: .9rem;
    font-weight: 500;
    color: var(--text2);
    transition: all var(--transition);
    position: relative;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(124,109,250,.18), rgba(250,109,142,.1));
    color: var(--accent1);
    font-weight: 700;
  }
  .nav-item.active::before {
    content:'';
    position:absolute;
    left:0; top:4px; bottom:4px;
    width:3px;
    border-radius:0 3px 3px 0;
    background: linear-gradient(to bottom, var(--accent1), var(--accent2));
  }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    font-size: .65rem;
    padding: 1px 7px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--text3);
  }

  /* ── TOPBAR ── */
  #topbar {
    position: fixed;
    top: 0;
    left: var(--sidebar-w);
    right: 0;
    height: 60px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    z-index: 90;
    transition: background var(--transition), left var(--transition);
  }
  .topbar-title { font-size: 1rem; font-weight: 700; color: var(--text); flex:1; }
  .topbar-chip {
    font-size: .72rem;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 600;
  }
  #btn-theme {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  #btn-theme:hover { background: var(--surface2); transform: rotate(20deg); }
  #btn-menu {
    display: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 1.1rem;
    align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  #btn-sound {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }

  /* ── MAIN CONTENT ── */
  #main {
    margin-left: var(--sidebar-w);
    padding-top: 60px;
    min-height: 100vh;
    transition: margin-left var(--transition);
  }
  .content-area {
    max-width: 860px;
    margin: 0 auto;
    padding: 36px 28px 80px;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
  }
  .hero-emoji { font-size: 4rem; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .hero h1 { font-size: 2.4rem; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
  .hero h1 span { background: linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .hero p { color: var(--text2); font-size: 1rem; max-width: 480px; margin: 0 auto 28px; line-height: 1.7; }
  .hero-stats {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  }
  .stat-pill {
    padding: 8px 20px;
    border-radius: 99px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: .85rem;
    font-weight: 600;
    color: var(--text2);
  }
  .stat-pill span { color: var(--accent1); }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 32px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow var(--transition);
    animation: slideUp .5s both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .section-card:hover { box-shadow: var(--shadow), var(--shadow-glow); }
  .card-header {
    padding: 22px 28px 18px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .card-header::after {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    border-radius:2px 2px 0 0;
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .card-meta { flex: 1; }
  .card-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 4px; }
  .card-subtitle { font-size: .8rem; color: var(--text2); font-weight: 500; }
  .card-tag {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .card-body { padding: 24px 28px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--bg2);
    padding: 4px;
    border-radius: 10px;
    width: fit-content;
  }
  .tab-btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: var(--font-main);
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── EXPLANATION BOX ── */
  .explain-box {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-bottom: 16px;
    border-left: 3px solid var(--accent1);
    line-height: 1.8;
    font-size: .92rem;
  }
  .explain-box p { margin-bottom: 8px; }
  .explain-box p:last-child { margin-bottom: 0; }
  .explain-label {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--accent1);
  }

  /* ── CODE BLOCK ── */
  .code-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  pre {
    background: #0a0a18;
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    font-family: var(--font-code);
    font-size: .82rem;
    line-height: 1.7;
    overflow-x: auto;
    border: 1px solid rgba(255,255,255,.06);
  }
  [data-theme="light"] pre { background: #1a1a3a; }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.06);
    color: var(--text2);
    font-size: .72rem;
    font-family: var(--font-main);
    cursor: pointer;
    transition: all var(--transition);
  }
  .copy-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }
  .kw { color: #fa6d8e; }
  .fn { color: #7c6dfa; }
  .str { color: #6dfad5; }
  .num { color: #fad76d; }
  .cm { color: #4a4a80; font-style: italic; }
  .op { color: #fa9a6d; }
  .br { color: #a0a0cc; }

  /* ── USE CASE ── */
  .usecase-box {
    background: linear-gradient(135deg, rgba(109,250,213,.06), rgba(109,186,255,.06));
    border: 1px solid rgba(109,250,213,.2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 16px;
    font-size: .88rem;
    line-height: 1.7;
  }
  .usecase-label { color: var(--accent3); font-weight: 700; margin-bottom: 6px; font-size: .72rem; letter-spacing:.1em; text-transform:uppercase; }

  /* ── LIVE DEMO ── */
  .demo-area {
    background: var(--bg3);
    border-radius: var(--radius-sm);
    padding: 20px;
    margin-bottom: 16px;
  }
  .demo-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 12px; }
  .demo-input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .demo-input {
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-main);
    font-size: .88rem;
    outline: none;
    flex: 1;
    min-width: 120px;
    transition: border-color var(--transition);
  }
  .demo-input:focus { border-color: var(--accent1); }
  .demo-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    font-family: var(--font-main);
    font-size: .88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .demo-btn:active { transform: scale(.96); }
  .demo-output {
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 8px;
    font-family: var(--font-code);
    font-size: .85rem;
    color: var(--accent3);
    min-height: 40px;
    word-break: break-word;
    line-height: 1.6;
    border: 1px solid var(--border);
  }

  /* ── QUIZ ── */
  .quiz-box {
    background: linear-gradient(135deg, rgba(250,215,109,.05), rgba(250,154,109,.05));
    border: 1px solid rgba(250,215,109,.2);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
  }
  .quiz-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--accent4); margin-bottom: 10px; }
  .quiz-question { font-size: .92rem; font-weight: 600; margin-bottom: 14px; line-height: 1.6; }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-opt {
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: var(--font-main);
    font-size: .88rem;
    text-align: left;
    transition: all .2s;
  }
  .quiz-opt:hover { border-color: var(--accent4); color: var(--text); }
  .quiz-opt.correct { border-color: var(--accent3); background: rgba(109,250,213,.1); color: var(--accent3); }
  .quiz-opt.wrong { border-color: var(--accent2); background: rgba(250,109,142,.1); color: var(--accent2); }
  .quiz-feedback { margin-top: 10px; font-size: .85rem; line-height: 1.6; padding: 8px 12px; border-radius: 6px; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(109,250,213,.1); color: var(--accent3); }
  .quiz-feedback.no { background: rgba(250,109,142,.1); color: var(--accent2); }
  .quiz-reset {
    margin-top: 10px;
    padding: 7px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--font-main);
    font-size: .8rem;
    cursor: pointer;
    display: none;
  }
  .quiz-reset.show { display: inline-block; }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    position: fixed;
    top: 60px; left: var(--sidebar-w); right: 0;
    height: 3px;
    background: var(--border);
    z-index: 89;
    transition: left var(--transition);
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    transition: width .3s ease;
    border-radius: 0 2px 2px 0;
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 99;
    backdrop-filter: blur(2px);
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 22px;
    font-size: .88rem;
    font-weight: 600;
    color: var(--text);
    z-index: 999;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── BACK TO TOP ── */
  #backtop {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(20px);
    transition: all .3s;
    z-index: 80;
  }
  #backtop.show { opacity: 1; transform: translateY(0); }

  /* ── SCORE TRACKER ── */
  #score-tracker {
    position: fixed;
    top: 70px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: .78rem;
    z-index: 88;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow);
    transition: all var(--transition);
  }
  .score-label { color: var(--text3); }
  .score-val { font-weight: 800; font-size: 1rem; color: var(--accent4); }

  /* ── RESPONSIVE ── */
  @media(max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main { margin-left: 0; }
    #topbar { left: 0; }
    .progress-bar-wrap { left: 0; }
    #btn-menu { display: flex; }
    #overlay.show { display: block; }
    .content-area { padding: 24px 16px 80px; }
    .hero h1 { font-size: 1.8rem; }
    #score-tracker { display: none; }
  }
  @media(max-width: 480px) {
    .card-header { flex-wrap: wrap; }
    .card-tag { margin-left: 0; }
    .demo-input-row { flex-direction: column; }
    .demo-input { min-width: unset; width: 100%; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">JS ফাংশন 🚀</div>
    <div class="sidebar-sub">বাংলায় শিখুন · Learn in Bangla</div>
  </div>
  <div class="sidebar-search"><input type="text" id="search-input" placeholder="🔍 খুঁজুন..."></div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</nav>

<div id="overlay"></div>

<!-- TOPBAR -->
<div id="topbar">
  <button id="btn-menu" onclick="toggleSidebar()">☰</button>
  <div class="topbar-title" id="topbar-title">JavaScript ফাংশন</div>
  <button id="btn-sound" onclick="toggleSound()" title="Sound toggle">🔊</button>
  <button id="btn-theme" onclick="toggleTheme()" title="Theme toggle">🌙</button>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

<!-- MAIN -->
<div id="main">
  <div class="content-area" id="content-area">
    <!-- Hero -->
    <div class="hero" id="section-home">
      <span class="hero-emoji">⚡</span>
      <h1>JavaScript <span>ফাংশন</span> শিখুন</h1>
      <p>বাংলায় সহজ ব্যাখ্যা, লাইভ উদাহরণ এবং কুইজ সহ — সমস্ত ধরনের JavaScript ফাংশন এক জায়গায়।</p>
      <div class="hero-stats">

let soundOn = true;
let score = 0;
let scoreTotal = 0;
let quizAnswered = {};
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.15) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e){}
}

function playClick() { playTone(440, 0.08, 'sine', 0.1); }
function playSuccess() {
  playTone(523, 0.1, 'sine', 0.12);
  setTimeout(()=>playTone(659, 0.1,'sine',0.12),100);
  setTimeout(()=>playTone(784, 0.2,'sine',0.12),200);
}
function playError() {
  playTone(220, 0.15, 'sawtooth', 0.08);
  setTimeout(()=>playTone(180, 0.2,'sawtooth',0.08),150);
}

  card.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

//  QUIZ
// ═══════════════════════════════════════
function answerQuiz(cardId, optIdx, correctIdx, feedback, wrongFeedback) {
  if (quizAnswered[cardId]) return;
  quizAnswered[cardId] = true;
  scoreTotal++;

  const card = document.getElementById('card-' + cardId);
  const opts = card.querySelectorAll('.quiz-opt');
  const fb = card.querySelector('.quiz-feedback');
  const reset = card.querySelector('.quiz-reset');

  opts.forEach(o => o.disabled = true);
  opts[correctIdx].classList.add('correct');

  if (optIdx === correctIdx) {
    score++;
    fb.textContent = feedback;
    fb.className = 'quiz-feedback show ok';
    playSuccess();
    showToast('🎉 সঠিক উত্তর!');
  } else {
    opts[optIdx].classList.add('wrong');
    fb.textContent = wrongFeedback;
    fb.className = 'quiz-feedback show no';
    playError();
    showToast('❌ ভুল হয়েছে।');
  }

  document.getElementById('score-val').textContent = score;
  document.getElementById('score-total').textContent = scoreTotal;
  reset.classList.add('show');
}

function resetQuiz(cardId) {
  quizAnswered[cardId] = false;
  const card = document.getElementById('card-' + cardId);
  card.querySelectorAll('.quiz-opt').forEach(o => {
    o.disabled = false;
    o.classList.remove('correct','wrong');
  });
  const fb = card.querySelector('.quiz-feedback');
  fb.className = 'quiz-feedback';
  card.querySelector('.quiz-reset').classList.remove('show');
  playClick();
}

// Closure counter
const closureCounter = (() => { let c = 0; return { inc:()=>++c, dec:()=>--c, reset:()=>{c=0;return 0;}, get:()=>c }; })();
function closureInc() { const v=closureCounter.inc(); document.getElementById('dout-closure').textContent=`কাউন্টার: ${v} (private ভ্যারিয়েবল বাইরে দেখা যাচ্ছে না!)`; playClick(); }
function closureDec() { const v=closureCounter.dec(); document.getElementById('dout-closure').textContent=`কাউন্টার: ${v}`; playClick(); }
function closureReset() { const v=closureCounter.reset(); document.getElementById('dout-closure').textContent=`কাউন্টার: ${v} (রিসেট হয়েছে)`; playClick(); }

function runIife() {
  const n = parseFloat(document.getElementById('d1-iife').value)||0;
  const result = ((x) => {
    const sq = x * x;
    const cube = x * x * x;
    return `IIFE চলেছে!\n${x}² = ${sq}\n${x}³ = ${cube}`;
  })(n);
  document.getElementById('dout-iife').textContent = result;
  playSuccess();
}

function runHof() {
  const n = parseFloat(document.getElementById('d1-hof').value)||0;
  const op = document.getElementById('d2-hof').value;
  const ops = { double: x=>`${x} × 2 = ${x*2}`, square: x=>`${x}² = ${x**2}`, cube: x=>`${x}³ = ${x**3}`, neg: x=>`-${x} = ${-x}` };
  const apply = (num, fn) => fn(num);
  document.getElementById('dout-hof').textContent = apply(n, ops[op]);
  playClick();
}

function runMap() {
  const input = document.getElementById('d1-map').value;
  const tax = parseFloat(document.getElementById('d2-map').value)||0;
  const arr = input.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const result = arr.map(p => (p * (1 + tax/100)).toFixed(2));
  document.getElementById('dout-map').textContent = `মূল: [${arr.join(', ')}]\n${tax}% ট্যাক্সসহ: [${result.join(', ')}]`;
  playSuccess();
}

function isPrime(n) { if(n<2)return false; for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0)return false; return true; }
function runFilter() {
  const input = document.getElementById('d1-filter').value;
  const type = document.getElementById('d2-filter').value;
  const arr = input.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const filters = { even:x=>x%2===0, odd:x=>x%2!==0, gt5:x=>x>5, prime:isPrime };
  const labels = { even:'জোড়', odd:'বিজোড়', gt5:'৫ এর বেশি', prime:'মৌলিক' };
  const result = arr.filter(filters[type]);
  document.getElementById('dout-filter').textContent = `মূল: [${arr.join(', ')}]\n${labels[type]}: [${result.join(', ')}]`;
  playSuccess();
}

function runReduce() {
  const input = document.getElementById('d1-reduce').value;
  const arr = input.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  const total = arr.reduce((sum,n)=>sum+n, 0);
  const max = arr.reduce((m,n)=>n>m?n:m);
  const min = arr.reduce((m,n)=>n<m?n:m);
  document.getElementById('dout-reduce').textContent = `তালিকা: [${arr.join(', ')}]\nমোট: ৳${total}\nসর্বোচ্চ: ৳${max}\nসর্বনিম্ন: ৳${min}\nগড়: ৳${(total/arr.length).toFixed(2)}`;
  playSuccess();
}

function runCallback() {
  const name = document.getElementById('d1-callback').value || 'বন্ধু';
  const out = document.getElementById('dout-callback');
  out.textContent = '⏳ ১ সেকেন্ড অপেক্ষা করুন...';
  playClick();
  function স্বাগত(নাম, callback) { setTimeout(() => callback(নাম), 1000); }
  স্বাগত(name, (n) => { out.textContent = `🎉 স্বাগতম, ${n}! Callback সফলভাবে চলেছে।`; playSuccess(); });
}

async function runAsync() {
  const id = parseInt(document.getElementById('d1-async').value)||1;
  const out = document.getElementById('dout-async');

          </div>
          <div class="usecase-box">
            <div class="usecase-label">🌍 বাস্তব ব্যবহার</div>
            ${fn.usecase}
          </div>
        </div>

        <div class="tab-panel" data-tab="code">
          <div class="code-wrap">
            <button class="copy-btn" onclick="copyCode(this)">📋 কপি</button>
            <pre>${fn.code}</pre>
          </div>
        </div>

        <div class="tab-panel" data-tab="demo">
          ${renderDemo(fn, fn.id)}
        </div>

        <div class="tab-panel" data-tab="quiz">
          <div class="quiz-box">
            <div class="quiz-label">❓ কুইজ</div>
            <div class="quiz-question">${fn.quiz.q}</div>
            <div class="quiz-options">
              ${fn.quiz.opts.map((opt,i)=>`<button class="quiz-opt" onclick="answerQuiz('${fn.id}',${i},${fn.quiz.ans},\`${fn.quiz.feedback}\`,\`${fn.quiz.wrongFeedback}\`)">${String.fromCharCode(65+i)}) ${opt}</button>`).join('')}
            </div>
            <div class="quiz-feedback"></div>
            <button class="quiz-reset" onclick="resetQuiz('${fn.id}')">🔄 আবার চেষ্টা করুন</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ═══════════════════════════════════════
//  SCROLL / PROGRESS / ACTIVE NAV
// ═══════════════════════════════════════
function scrollToCard(id) {
  const el = document.getElementById('card-'+id);
  if(el) { el.scrollIntoView({behavior:'smooth', block:'start'}); }
  if(window.innerWidth <= 768) { sidebarOpen=true; toggleSidebar(); }
  playNav();
}

window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total = document.body.scrollHeight - window.innerHeight;
  document.getElementById('progress-bar').style.width = (scrolled/total*100)+'%';
  document.getElementById('backtop').classList.toggle('show', scrolled > 300);

  // Active nav highlight
  let active = null;
  FUNCTIONS.forEach(fn => {
    const el = document.getElementById('card-'+fn.id);
    if(el && el.getBoundingClientRect().top < 120) active = fn.id;
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(active) { const navEl = document.getElementById('nav-'+active); if(navEl) navEl.classList.add('active'); }

  // Topbar title update
  if(active) {
    const fn = FUNCTIONS.find(f=>f.id===active);
    if(fn) document.getElementById('topbar-title').textContent = fn.icon + ' ' + fn.title;
  } else {
    document.getElementById('topbar-title').textContent = 'JavaScript ফাংশন';
  }
});

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ═══════════════════════════════════════
//  PWA SERVICE WORKER
// ═══════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='jsfn-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/']))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
buildSidebar();
buildCards();
document.getElementById('score-total').textContent = 0;
</script>
